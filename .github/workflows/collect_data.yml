name: Collect Public Research Data

on:
  workflow_dispatch:
    inputs:
      domain:
        description: Domain to export
        required: true
        default: all
        type: choice
        options:
          - all
          - crypto
          - ashare
  schedule:
    # Asia/Shanghai 09:00, 12:00, 21:00
    - cron: "0 1,4,13 * * *"
    # Asia/Shanghai 15:30
    - cron: "30 7 * * *"
    # Asia/Shanghai 00:00 crypto cycle
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PublicData
        uses: actions/checkout@v4
        with:
          path: public-data

      - name: Checkout collector source
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPOSITORY || 'hhxcv/Crypto' }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          path: collector

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: collector/pyproject.toml

      - name: Install collector
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Export public data
        working-directory: collector
        env:
          TZ: Asia/Shanghai
        run: |
          DOMAIN="${{ github.event.inputs.domain || 'all' }}"
          python -m crypto_monitor cloud-export --domain "$DOMAIN" --output-dir ../public-data/data

      - name: Commit changed data
        working-directory: public-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No public data changes to commit."
          else
            git commit -m "Update public research data"
            git push
          fi
