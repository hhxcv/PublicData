name: Collect Public Research Data

on:
  workflow_dispatch:
    inputs:
      domain:
        description: Domain to export
        required: true
        default: all
        type: choice
        options:
          - all
          - crypto
          - ashare
      request_id:
        description: Optional request id to persist in manifests
        required: false
        type: string
  push:
    paths:
      - "requests/**"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PublicData
        uses: actions/checkout@v4
        with:
          path: public-data
          fetch-depth: 2

      - name: Checkout collector source
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPOSITORY || 'hhxcv/Crypto' }}
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}
          path: collector

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: collector/pyproject.toml

      - name: Install collector
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve collection request
        id: request
        working-directory: public-data
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DOMAIN="${{ github.event.inputs.domain || 'all' }}"
            REQUEST_ID="${{ github.event.inputs.request_id }}"
          else
            REQUEST_FILE="$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'requests/**' | grep '\.json$' | tail -n 1)"
            if [ -z "$REQUEST_FILE" ] || [ ! -f "$REQUEST_FILE" ]; then
              echo "No collection request file found."
              exit 1
            fi
            python - "$REQUEST_FILE" <<'PY' > request.env
          import json
          import re
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          payload = json.loads(path.read_text(encoding="utf-8-sig"))
          domain = str(payload.get("domain") or "").strip().lower()
          if domain not in {"crypto", "ashare", "all"}:
              raise SystemExit(f"Unsupported request domain: {domain!r}")
          request_id = str(payload.get("request_id") or path.stem).strip()
          if not re.fullmatch(r"[A-Za-z0-9_.:-]+", request_id):
              raise SystemExit("request_id may only contain letters, numbers, underscore, dot, colon, or hyphen")
          print(f"DOMAIN={domain}")
          print(f"REQUEST_ID={request_id}")
          PY
            source request.env
          fi
          if [ -z "$REQUEST_ID" ]; then
            REQUEST_ID="manual-$(date -u +%Y%m%d%H%M%S)"
          fi
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"

      - name: Export public data
        working-directory: collector
        env:
          TZ: Asia/Shanghai
        run: |
          python -m crypto_monitor cloud-export \
            --domain "${{ steps.request.outputs.domain }}" \
            --request-id "${{ steps.request.outputs.request_id }}" \
            --output-dir ../public-data/data

      - name: Commit changed data
        working-directory: public-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No public data changes to commit."
          else
            git commit -m "Update public research data"
            git push
          fi
